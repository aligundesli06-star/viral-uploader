name: Upload Viral Shorts

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth-oauthlib

      - name: Run uploader
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python3 viral_downloader.py && python3 youtube_uploader.py
